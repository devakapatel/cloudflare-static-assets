<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Assets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { max-width: 600px; width: 100%; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; margin-bottom: 2rem; }
    a { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; margin-bottom: 0.5rem; background: #161616; border: 1px solid #222; border-radius: 8px; color: #e0e0e0; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
    a:hover { background: #1a1a1a; border-color: #444; }
    .name { font-weight: 500; }
    .size { color: #888; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Static Assets</h1>
    <p>Binary files hosted via GitHub Pages + Cloudflare.</p>
    <a href="100.bin"><span class="name">100.bin</span><span class="size">100 MB</span></a>
  </div>
</body>
</html>
